<!DOCTYPE html>
<html>
<head>
    <title>Моя карта</title>
    <style>
        /* Обязательно задаем высоту блока карты, иначе карта не отобразится */
        #map {
            width: 100%;
            height: 400px;
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>Как нас найти</h1>
    <!-- Контейнер для карты -->
    <div id="map"></div>

    <!-- Здесь будет код для подключения API -->
    <script src="https://api-maps.yandex.ru/v3/?apikey=d6d96249-7681-4ece-affa-4017e126a5e7&lang=ru_RU"></script>
    <script>
        // Ждем загрузки страницы и API
        ymaps3.ready.then(() => {
            // Создаем карту
            const map = new ymaps3.YMap(
                document.getElementById('map'), // Элемент, куда вставляем карту
                {
                    location: {
                        // Координаты центра карты (например, центр Москвы)
                        center: [37.588144, 55.733842],
                        zoom: 10 // Уровень приближения
                    }
                }
            );

            // Добавляем слой для отображения самой карты (плитки)
            map.addChild(new ymaps3.YMapDefaultSchemeLayer());

            // Добавляем управление (кнопки "+", "-", и т.д.)
            map.addChild(new ymaps3.YMapDefaultFeaturesLayer());
            map.addChild(new ymaps3.YMapControls({ position: 'right' })).addChild(new ymaps3.YMapZoomControl());
        });
    </script>
</body>
</html>
