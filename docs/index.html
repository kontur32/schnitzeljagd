<!DOCTYPE html>
<html>
<head>
    <title>Карта свалок (Яндекс)</title>
    <script src="https://api-maps.yandex.ru"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSW0x6L1YWyrrq36g1NALCTw-n0TEOPiSye6zJaSDWKLNdVN8t4R_i3TyEs4rBVsz-cE8CNHLFHqjR5/pub?gid=1349514042&single=true&output=csv';

        async function initMap() {
            await ymaps3.ready;
            const {YMap, YMapDefaultSchemeLayer, YMapDefaultFeaturesLayer, YMapMarker} = ymaps3;

            const map = new YMap(document.getElementById('map'), {
                location: { center: [41.05, 56.95], zoom: 12 } // Иваново [Lng, Lat]
            });

            map.addChild(new YMapDefaultSchemeLayer());
            map.addChild(new YMapDefaultFeaturesLayer());

            // Загружаем данные из таблицы
            Papa.parse(CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        if (row.Lat && row.Lng) {
                            const markerElement = document.createElement('div');
                            markerElement.innerHTML = '📍'; // Или иконка мусорки
                            markerElement.style.cursor = 'pointer';
                            markerElement.style.fontSize = '24px';

                            const marker = new YMapMarker({
                                coordinates: [parseFloat(row.Lng), parseFloat(row.Lat)],
                                onClick: () => alert(`Свалка от ${row.Date}. Фото: ${row.PhotoUrl}`)
                            }, markerElement);

                            map.addChild(marker);
                        }
                    });
                }
            });
        }
        initMap();
    </script>
</body>
</html>
